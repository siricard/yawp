# Yawp self-hosting compose file.
#
name: yawp

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yawp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-yawp_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yawp} -d ${POSTGRES_DB:-yawp_prod}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  phoenix:
    image: ${YAWP_IMAGE:-ghcr.io/siricard/yawp:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yawp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-yawp_prod}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      TOKEN_SIGNING_SECRET: ${TOKEN_SIGNING_SECRET:?TOKEN_SIGNING_SECRET is required}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4000"
      CLOAK_KEY: ${CLOAK_KEY:?CLOAK_KEY is required}
      ATTACHMENT_SIGNING_SECRET: ${ATTACHMENT_SIGNING_SECRET:?ATTACHMENT_SIGNING_SECRET is required}
      UPLOADS_DIR: ${UPLOADS_DIR:-/data/uploads}
    ports:
      - "127.0.0.1:${PHX_PORT:-4000}:4000"
    volumes:
      - uploads_data:${UPLOADS_DIR:-/data/uploads}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      phoenix:
        condition: service_healthy
    environment:
      PHX_HOST: ${PHX_HOST:-localhost}
      CADDY_TLS_SNIPPET: ${CADDY_TLS_SNIPPET:-local_tls}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2021/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
