# Yawp self-hosting compose file.
#
# Two services:
#   - postgres: persistent data store (matches host Postgres.app 17.x).
#   - phoenix: the OTP release built from ../Dockerfile, exposing :4000.
#
# Environment is loaded from a sibling `.env` file (see `.env.example`).
# `docker compose up -d` brings both up; Phoenix waits on Postgres being
# healthy before it boots.

name: yawp

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yawp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-yawp_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yawp} -d ${POSTGRES_DB:-yawp_prod}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  phoenix:
    # `image:` lets `docker compose pull` fetch a pre-built release from GHCR
    # (populated by .github/workflows/release.yml). `build:` is the local
    # fallback when no image is published yet — `docker compose up` builds
    # on demand. Both are intentional.
    image: ${YAWP_IMAGE:-ghcr.io/siricard/yawp:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      TOKEN_SIGNING_SECRET: ${TOKEN_SIGNING_SECRET:?TOKEN_SIGNING_SECRET is required}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4000"
    ports:
      - "${PHX_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  postgres_data:
