name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: GHCR image tag to deploy
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: siricard/yawp

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yawp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Run CI gate
        run: nix develop -c just ci

  build-image:
    name: Build and push deploy image
    runs-on: ubuntu-latest
    needs: ci-gate
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build provenance
        id: provenance
        run: |
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=${GITHUB_SHA}"
            echo "commit=${GITHUB_SHA}"
            echo "built_at=${built_at}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            YAWP_VERSION=${{ steps.provenance.outputs.version }}
            YAWP_COMMIT=${{ steps.provenance.outputs.commit }}
            YAWP_BUILT_AT=${{ steps.provenance.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging-a:
    name: Deploy staging A
    runs-on: ubuntu-latest
    needs:
      - ci-gate
      - build-image
    if: ${{ always() && needs.ci-gate.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.build-image.result == 'success') }}
    outputs:
      health: ${{ steps.health-check.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging
          chmod 600 ~/.ssh/staging

      - name: Deploy and health-check staging A
        id: health-check
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/staging -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new
        run: scripts/deploy.sh "${{ steps.image.outputs.ref }}" "deploy@${{ secrets.STAGING_A_HOST }}"

  deploy-staging-b:
    name: Deploy staging B
    runs-on: ubuntu-latest
    needs: deploy-staging-a
    if: ${{ needs.deploy-staging-a.outputs.health == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging
          chmod 600 ~/.ssh/staging

      - name: Deploy and health-check staging B
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/staging -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new
        run: scripts/deploy.sh "${{ steps.image.outputs.ref }}" "deploy@${{ secrets.STAGING_B_HOST }}"
