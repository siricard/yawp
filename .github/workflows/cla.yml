name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/.github/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],renovate[bot]'
          remote-organization-name: ''
          remote-repository-name: ''
          custom-notsigned-prcomment: 'Thank you for your contribution to Yawp! Before we can merge, we need you to sign our Contributor License Agreement. Please read the [CLA Document](https://github.com/${{ github.repository }}/blob/main/.github/CLA.md) and reply to this PR with the following text to sign:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All Contributors have signed the CLA. ✅'
          lock-pullrequest-aftermerge: false
