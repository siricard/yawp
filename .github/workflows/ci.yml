name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Compile, test, and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Fetch Elixir dependencies
        run: nix develop -c mix deps.get

      - name: Compile with warnings as errors
        run: nix develop -c mix compile --warnings-as-errors

      - name: Run Elixir tests
        run: nix develop -c mix test

      - name: Typecheck web assets
        run: nix develop -c bash -c 'cd assets && npx tsc --noEmit'

      - name: Typecheck React Native assets
        run: nix develop -c bash -c 'cd assets/native && npx tsc --noEmit'

  verify-singletons:
    name: Verify RN bundle singletons (react, css-interop, …)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Install RN dependencies
        run: nix develop -c bash -c 'cd assets/native && npm ci --no-audit --no-fund'

      # Builds iOS / Android / macOS bundles and asserts that each singleton
      # package in SINGLETON_DEDUPE resolves to exactly one node_modules
      # path per platform. Catches future drift between the consolidated
      # assets/app/ tree and the Metro `resolveRequest` dedup rules.
      - name: Verify Metro singleton dedup
        run: nix develop -c just verify-singletons
