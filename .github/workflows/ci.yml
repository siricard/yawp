name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Compile, test, and typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yawp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Fetch Elixir dependencies
        run: nix develop -c mix deps.get

      - name: Check formatting
        run: nix develop -c mix format --check-formatted

      - name: Compile with warnings as errors
        run: nix develop -c mix compile --warnings-as-errors

      - name: Setup Ash (create + migrate test DB)
        run: nix develop -c bash -c 'cd apps/yawp && mix ash.setup --quiet'

      - name: Run Elixir tests
        run: nix develop -c mix test

      - name: Install web asset dependencies
        run: nix develop -c bash -c 'cd apps/yawp/assets && npm ci --legacy-peer-deps --no-audit --no-fund'

      - name: Typecheck web assets
        run: nix develop -c bash -c 'cd apps/yawp/assets && npx tsc --noEmit'

      - name: Install RN dependencies
        run: nix develop -c bash -c 'cd apps/yawp/assets/native && npm ci --legacy-peer-deps --no-audit --no-fund'

      - name: Typecheck React Native assets
        run: nix develop -c bash -c 'cd apps/yawp/assets/native && npx tsc --noEmit'

      - name: Jest (React Native shared bundle)
        run: nix develop -c bash -c 'cd apps/yawp/assets/native && npm test --silent'

  verify-singletons:
    name: Verify RN bundle singletons (react, css-interop, …)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Install RN dependencies
        run: nix develop -c bash -c 'cd apps/yawp/assets/native && npm ci --legacy-peer-deps --no-audit --no-fund'

      # Builds iOS / Android / macOS bundles and asserts that each singleton
      # package in SINGLETON_DEDUPE resolves to exactly one node_modules
      # path per platform. Catches future drift between the consolidated
      # assets/app/ tree and the Metro `resolveRequest` dedup rules.
      - name: Verify Metro singleton dedup
        run: nix develop -c just verify-singletons

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs: verify-singletons

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Run release smoke
        run: nix develop -c just release-smoke
